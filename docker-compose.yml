services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/orchestrator
      APP_ENV: docker
      LOG_LEVEL: INFO
      MAX_TOOL_RETRIES: 2
      PYTHON_SANDBOX_TIMEOUT_SECONDS: 2
      DEFAULT_MODEL_PROVIDER: local
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python -m worker.main
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/orchestrator
      APP_ENV: docker
      LOG_LEVEL: INFO
      MAX_TOOL_RETRIES: 2
      PYTHON_SANDBOX_TIMEOUT_SECONDS: 2
      DEFAULT_MODEL_PROVIDER: local
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 20

  logs-ui:
    build: .
    command: uvicorn logs_ui.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/orchestrator
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
